# /etc/nginx/sites-available/alazab.dev
# Production Nginx config for alazab.dev (server IP: 3.76.123.170)
# After install:
#   sudo ln -s /etc/nginx/sites-available/alazab.dev /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d alazab.dev -d www.alazab.dev

# --- HTTP -> HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name alazab.dev www.alazab.dev;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Redirect www -> apex on HTTPS ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.alazab.dev;

    ssl_certificate     /etc/letsencrypt/live/alazab.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alazab.dev/privkey.pem;

    return 301 https://alazab.dev$request_uri;
}

# --- Main HTTPS server ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name alazab.dev;

    root /var/www/alazab.dev/current;
    index index.html;

    # SSL (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/alazab.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alazab.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Brotli (if module installed)
    # brotli on;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Long-cache hashed assets
    location ~* \.(js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|avif|svg|ico|mp4)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # Service worker — never cache
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        expires off;
        types { } default_type application/manifest+json;
    }

    # robots & sitemap
    location = /robots.txt   { access_log off; log_not_found off; }
    location = /sitemap.xml  { access_log off; log_not_found off; }

    # SPA fallback (React Router)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Block hidden files
    location ~ /\.(?!well-known) {
        deny all;
    }

    client_max_body_size 20m;
}
